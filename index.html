<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 채용 정보 관리 시스템</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f8fafe;
            --text-color: #333;
            --border-color: #e1e8ed;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0,05);
        }

        h2 {
            color: var(--primary-color);
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .header-row h2 {
            margin-bottom: 0;
        }

        .dashboard-title {
            cursor: pointer;
            user-select: none;
        }

        /* 필터 영역 */
        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filter-toggle-button {
            display: none;
            width: 100%;
            margin-bottom: 10px;
            border: 0;
            border-radius: 8px;
            padding: 10px 12px;
            background: #dbeafe;
            color: #1d4ed8;
            cursor: pointer;
            font-weight: 800;
        }

        .filter-group label {
            display: block;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #64748b;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* 테이블 영역 */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed;
            margin-top: 10px;
            font-size: 0.85em;
        }

        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            white-space: pre-line;
            overflow-wrap: anywhere;
        }

        #companyTable th:nth-child(1),
        #companyTable td:nth-child(1) {
            width: 12%;
        }

        #companyTable th:nth-child(2),
        #companyTable td:nth-child(2) {
            width: 9%;
        }

        #companyTable th:nth-child(3),
        #companyTable td:nth-child(3) {
            width: 9%;
        }

        #companyTable td:nth-child(3) {
            font-size: calc(1em - 2px);
        }

        #companyTable th:nth-child(4),
        #companyTable td:nth-child(4),
        #companyTable th:nth-child(7),
        #companyTable td:nth-child(7),
        #companyTable th:nth-child(8),
        #companyTable td:nth-child(8),
        #companyTable th:nth-child(11),
        #companyTable td:nth-child(11),
        #companyTable th:nth-child(13),
        #companyTable td:nth-child(13),
        #companyTable th:nth-child(14),
        #companyTable td:nth-child(14) {
            width: 6%;
        }

        #companyTable th:nth-child(5),
        #companyTable td:nth-child(5),
        #companyTable th:nth-child(6),
        #companyTable td:nth-child(6),
        #companyTable th:nth-child(9),
        #companyTable td:nth-child(9),
        #companyTable th:nth-child(10),
        #companyTable td:nth-child(10) {
            width: 7%;
        }

        #companyTable th:nth-child(12),
        #companyTable td:nth-child(12) {
            width: 13%;
        }

        #companyTable td:nth-child(12) {
            font-size: calc(1em - 2px);
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        #companyTable tbody tr.deadline-expired:not(.detail-open) td:first-child {
            position: relative;
        }

        #companyTable tbody tr.deadline-expired:not(.detail-open) td:first-child::after {
            content: '제출기한 만료';
            position: absolute;
            z-index: 5;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--expired-overlay-width, 100%);
            height: 100%;
            background: rgba(148, 163, 184, 0.42);
            color: rgba(220, 38, 38, 0.72);
            font-size: 1.05em;
            font-weight: 900;
            letter-spacing: 0.08em;
            pointer-events: none;
            white-space: nowrap;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
        }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-green { background: #dcfce7; color: #166534; }

        .type-badge {
            min-width: 38px;
            flex-direction: column;
            gap: 1px;
            line-height: 1.2;
        }

        .company-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .upload-section {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        .upload-section h3 {
            margin: 0 0 10px;
            color: #1e40af;
        }

        .upload-help {
            margin: 8px 0 0;
            color: #64748b;
            font-size: 0.9em;
            line-height: 1.45;
        }

        .upload-status {
            margin-top: 10px;
            color: #1e40af;
            font-weight: 600;
            min-height: 20px;
        }

        .ai-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .primary-button,
        .secondary-button {
            border: 0;
            border-radius: 6px;
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .primary-button {
            background: var(--primary-color);
            color: #fff;
        }

        .secondary-button {
            background: #dbeafe;
            color: #1d4ed8;
        }

        #aiResultText {
            min-height: 120px;
            margin-top: 12px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.9em;
        }

        .action-buttons {
            display: flex;
            gap: 6px;
            justify-content: center;
            white-space: nowrap;
        }

        .btn-small {
            border: 0;
            border-radius: 5px;
            padding: 6px 8px;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 600;
        }

        .btn-edit {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-save {
            background: #dcfce7;
            color: #166534;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #334155;
        }

        .cell-edit-input,
        .cell-edit-select {
            min-width: 110px;
            padding: 7px;
            font-size: 0.9em;
        }

        .cell-edit-input {
            min-height: 38px;
            line-height: 1.35;
            resize: vertical;
            white-space: pre-wrap;
        }

        .cell-edit-checks {
            display: flex;
            gap: 8px;
            justify-content: center;
            min-width: 110px;
        }

        .cell-edit-checks label {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            white-space: nowrap;
        }

        .cell-edit-checks input {
            width: auto;
        }

        .saving-notice {
            position: fixed;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            padding: 12px 18px;
            border-radius: 999px;
            background: #1e40af;
            color: #fff;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.22);
            font-weight: 700;
        }

        .table-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .company-name-button {
            border: 0;
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            font-weight: 700;
            text-decoration: underline;
            display: block;
            max-width: 150px;
            margin: 0 auto;
            line-height: 1.25;
            max-height: 2.5em;
            overflow: hidden;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        .detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .detail-dialog {
            width: min(720px, 100%);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.25);
            overflow: hidden;
        }

        .detail-header,
        .detail-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-footer {
            border-top: 1px solid var(--border-color);
            border-bottom: 0;
            justify-content: flex-end;
        }

        .detail-body {
            padding: 18px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .detail-field.full {
            grid-column: 1 / -1;
        }

        .detail-field label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
        }

        .company-detail-row td {
            background: #f8fafc;
            padding: 0;
            text-align: left;
            white-space: normal;
            line-height: normal;
        }

        .inline-detail-panel {
            border: 0;
            border-radius: 0;
            margin: 0;
            padding: 8px 10px;
            background: transparent;
        }

        .inline-detail-title {
            font-size: 0.95em;
            font-weight: 800;
            color: #1e40af;
        }

        .inline-detail-title-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .inline-detail-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
        }

        .inline-detail-header-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .inline-detail-officer {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: #f8fafc;
            color: #334155;
            font-size: 0.82em;
            font-weight: 700;
            white-space: nowrap;
        }

        .inline-detail-officer input {
            width: 120px;
            height: 24px;
            padding: 2px 6px;
            font-size: 0.9em;
        }

        .inline-detail-url-field {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .inline-detail-url-field label {
            color: #475569;
            font-size: 0.82em;
            font-weight: 700;
            white-space: nowrap;
        }

        .inline-detail-url-field input {
            height: 26px;
            padding: 3px 7px;
            font-size: 0.85em;
        }

        .homepage-link-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 0.82em;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .request-file-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 0.82em;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .request-file-button.disabled {
            background: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .detail-header-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 10px;
            border: 0;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 800;
            white-space: nowrap;
        }

        .request-file-upload {
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .request-file-upload label {
            color: #475569;
            font-size: 0.82em;
            font-weight: 700;
            white-space: nowrap;
        }

        .request-file-upload input {
            max-width: 190px;
            padding: 4px;
            font-size: 0.82em;
        }

        .inline-detail-panel input:disabled,
        .inline-detail-panel textarea:disabled {
            background: #f8fafc;
            color: #475569;
        }

        .inline-detail-grid {
            display: grid;
            grid-template-columns: repeat(40, minmax(0, 1fr));
            gap: 5px 10px;
        }

        .inline-detail-field {
            display: block;
            min-height: 0;
            padding: 0;
            border: 0;
            background: transparent;
            box-sizing: border-box;
        }

        .inline-detail-field-body {
            min-height: 28px;
            padding: 5px 7px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
        }

        .inline-detail-field.full {
            grid-column: 1 / -1;
        }

        .inline-detail-field.span-2 {
            grid-column: span 2;
        }

        .inline-detail-field.span-7 {
            grid-column: span 7;
        }

        .inline-detail-field.span-12 {
            grid-column: span 12;
        }

        .inline-detail-field.span-16 {
            grid-column: span 16;
        }

        .inline-detail-field.span-3 {
            grid-column: span 3;
        }

        .inline-detail-field.span-4 {
            grid-column: span 4;
        }

        .inline-detail-field.span-8 {
            grid-column: span 8;
        }

        .inline-detail-field.span-5 {
            grid-column: span 5;
        }

        .inline-detail-field label {
            display: block;
            font-size: 0.86em;
            font-weight: 700;
            line-height: 1.1;
            margin-bottom: 3px;
            color: #475569;
        }

        .inline-detail-field input,
        .inline-detail-field textarea {
            height: 28px;
            min-height: 28px;
            padding: 4px 7px;
            font-size: 0.85em;
            line-height: 1.25;
            background: #fff;
        }

        .inline-detail-readonly {
            display: block;
            min-height: 16px;
            padding: 0;
            border: 0;
            background: transparent;
            color: #334155;
            font-size: 0.85em;
            line-height: 1.35;
            white-space: pre-wrap;
        }

        .inline-detail-field textarea[data-detail-field="documents"] {
            height: 30px;
            min-height: 30px;
        }

        .inline-detail-field textarea[data-detail-field="notes"] {
            height: 42px;
            min-height: 42px;
        }

        .inline-detail-actions {
            display: flex;
            justify-content: flex-end;
            gap: 6px;
            margin-top: 8px;
        }

        .inline-detail-actions .secondary-button,
        .inline-detail-actions .primary-button {
            padding: 6px 10px;
            font-size: 0.85em;
        }

        @media (max-width: 640px) {
            body {
                padding: 10px;
            }

            .container {
                padding: 14px;
            }

            .filter-toggle-button {
                display: block;
            }

            .filter-section {
                display: none;
                grid-template-columns: 1fr;
                gap: 10px;
                padding: 12px;
            }

            .filter-section.open {
                display: grid;
            }

            #companyTable {
                min-width: 1180px;
            }

            .detail-body {
                grid-template-columns: 1fr;
            }

            .inline-detail-grid {
                grid-template-columns: 1fr;
            }

            .inline-detail-field.span-2,
            .inline-detail-field.span-7,
            .inline-detail-field.span-12,
            .inline-detail-field.span-16,
            .inline-detail-field.span-3,
            .inline-detail-field.span-4,
            .inline-detail-field.span-5,
            .inline-detail-field.span-8 {
                grid-column: 1;
            }

            .inline-detail-header {
                align-items: flex-start;
                flex-direction: column;
            }
        }
    </style>
</head>
<body>

<div class="saving-notice hidden" id="savingNotice" role="status" aria-live="polite">반영중입니다.</div>

<div class="container">
    <div class="header-row">
        <h2 class="dashboard-title" id="dashboardTitle" title="관리자 모드">🏢 기업 채용 정보 관리 대시보드</h2>
        <button class="primary-button admin-only hidden" type="button" onclick="toggleAiCompanyPanel()">AI기업추가</button>
    </div>

    <div class="upload-section hidden" id="aiCompanyPanel">
        <h3>Gemini로 항목 추출</h3>
        <input type="file" id="sourceFileInput" accept="image/*,.pdf,application/pdf" onchange="handleAiFileSelect(event)">
        <p class="upload-help">
            API 키 없이 사용하는 방식입니다. 파일을 선택한 뒤 프롬프트를 복사하고 Gemini에 파일을 직접 첨부해 보내세요.
            Gemini가 돌려준 JSON을 아래에 붙여넣으면 항목이 바로 추가됩니다.
        </p>
        <div class="upload-status" id="uploadStatus"></div>
        <div class="ai-actions">
            <button class="primary-button" type="button" onclick="copyGeminiPrompt()">Gemini 프롬프트 복사</button>
            <button class="secondary-button" type="button" onclick="openGemini()">Gemini 열기</button>
        </div>
        <textarea id="aiResultText" placeholder="Gemini 답변(JSON)을 여기에 붙여넣으세요."></textarea>
        <div class="ai-actions">
            <button class="primary-button" type="button" onclick="addAiResultRows(this)">붙여넣은 결과 항목 추가</button>
        </div>
    </div>

    <!-- 필터 및 검색 -->
    <button class="filter-toggle-button" id="filterToggleButton" type="button" onclick="toggleFilterPanel()" aria-expanded="false">필터링</button>
    <div class="filter-section">
        <div class="filter-group">
            <label>회사명 검색</label>
            <input type="text" id="searchName" onkeyup="filterTable()" placeholder="회사명 입력...">
        </div>
        <div class="filter-group">
            <label>소재지</label>
            <input type="text" id="searchLocation" list="filterLocationOptions" oninput="filterTable()" placeholder="소재지 검색 또는 선택...">
            <datalist id="filterLocationOptions"></datalist>
        </div>
        <div class="filter-group">
            <label>기업분류</label>
            <select id="filterType" onchange="filterTable()">
                <option value="">전체</option>
            </select>
        </div>
        <div class="filter-group">
            <label>기숙사</label>
            <select id="filterDormitory" onchange="filterTable()">
                <option value="">전체</option>
            </select>
        </div>
        <div class="filter-group">
            <label>병역특례</label>
            <select id="filterMilitary" onchange="filterTable()">
                <option value="">전체</option>
            </select>
        </div>
        <div class="filter-group">
            <label>근무형태</label>
            <input type="text" id="searchWorkType" onkeyup="filterTable()" placeholder="근무형태 검색...">
        </div>
        <div class="filter-group">
            <label>계열</label>
            <select id="filterSeries" onchange="filterTable()">
                <option value="">전체</option>
            </select>
        </div>
        <div class="filter-group">
            <label>직무</label>
            <input type="text" id="searchJob" onkeyup="filterTable()" placeholder="직무 검색...">
        </div>
    </div>

    <!-- 데이터 테이블 -->
    <div class="table-actions admin-only hidden">
        <button class="primary-button" type="button" onclick="addManualCompany()">직접 항목 추가</button>
    </div>
    <div class="table-wrapper">
        <table id="companyTable">
            <thead>
                <tr>
                    <th>회사명</th>
                    <th>소재지</th>
                    <th>업종</th>
                    <th>기업분류</th>
                    <th>연매출</th>
                    <th>종업원</th>
                    <th>기숙사</th>
                    <th>병역특례</th>
                    <th>근무형태</th>
                    <th>급여</th>
                    <th>계열</th>
                    <th>직무</th>
                    <th>채용인원</th>
                    <th class="admin-only hidden">관리</th>
                </tr>
            </thead>
            <tbody>
                <tr><td colspan="14">데이터를 불러오는 중입니다...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/pdf-lib/dist/pdf-lib.min.js"></script>
<script>

        return (data || []).map(supabaseRowToCompany);

    async function insertCompaniesToSupabase(rows) {
        const payload = rows.map(companyToSupabaseRow);
        payload.forEach((row) => delete row.id);

        const { error } = await getSupabaseClient()
            .from(SUPABASE_TABLE)
            .insert(payload);

        if (error) throw error;
    }

        const payload = companyToSupabaseRow(row);

        const { error } = await getSupabaseClient()
            .from(SUPABASE_TABLE)
            .update(payload)
            .eq('id', id);

        if (error) throw error;
    }

    async function deleteCompanyFromSupabase(id) {

            .from(SUPABASE_TABLE)
            .delete()

            return next;
        }, {});
        return normalizeCompanyRow(company);
    }

    function parseAiRows(value) {
        let cleaned = String(value || '')
            .trim()
            .replace(/^```(?:json)?/i, '')
            .replace(/```$/i, '')
            .trim();
        if (!cleaned) return [];

        if (!cleaned.startsWith('[') && !cleaned.startsWith('{')) {
            const arrayStart = cleaned.indexOf('[');
            const arrayEnd = cleaned.lastIndexOf(']');
            const objectStart = cleaned.indexOf('{');
            const objectEnd = cleaned.lastIndexOf('}');
            if (arrayStart >= 0 && arrayEnd > arrayStart) {
                cleaned = cleaned.slice(arrayStart, arrayEnd + 1);
            } else if (objectStart >= 0 && objectEnd > objectStart) {
                cleaned = cleaned.slice(objectStart, objectEnd + 1);
            }
        }

        const parsed = JSON.parse(cleaned);
        const rows = Array.isArray(parsed) ? parsed : [parsed];
        return rows.map(normalizeAiRow).filter((row) => row.companyName);
    }

    function normalizeAiRow(row) {
        return {
            companyName: getAiField(row, '회사명', 'companyName'),
            location: normalizeLocation(getAiField(row, '소재지', '주소', 'location', 'address')),
            industry: getAiField(row, '업종', 'industry'),
            type: getAiField(row, '기업분류', 'type'),
            revenue: getAiField(row, '연매출', 'revenue'),
            employees: getAiField(row, '종업원', 'employees'),
            dormitory: getAiField(row, '기숙사', 'dormitory'),
            military: getAiField(row, '병역특례', 'military'),
            workType: getAiField(row, '근무형태', 'workType'),
            salary: getAiField(row, '급여', 'salary'),
            series: normalizeSeries(getAiField(row, '계열', '전공계열', 'series')),
            job: getAiField(row, '직무', '직무(전공)', '전공', 'job'),
            headcount: getAiField(row, '채용인원', 'headcount'),
            homepageUrl: getAiField(row, '회사 홈페이지 URL', '홈페이지', '홈페이지 URL', 'website', 'homepageUrl'),
            documents: getAiField(row, '필요서류', 'documents'),
            submissionDeadline: getAiField(row, '제출기한', '서류제출기한', 'submissionDeadline'),
            officer: getAiField(row, '담당 산학협력지원관', '담당자', '산학협력지원관', 'officer'),
            documentDate: getAiField(row, '서류전형 일자', '서류전형일', 'documentDate'),
            interviewDate: getAiField(row, '면접일정 일자', '면접일정', '면접일', 'interviewDate'),
            notes: getAiField(row, '특이사항', '비고', 'notes')
        };
    }

    function getAiField(row, ...keys) {
        for (const key of keys) {
            if (row && row[key] !== undefined && row[key] !== null) {
                return cleanupField(row[key]);
            }
        }
        return '';
    }

    function parseCompanyText(text, fileName = '') {
        const lines = text
            .split(/\r?\n/)
            .map((line) => line.replace(/\s+/g, ' ').trim())
            .filter(Boolean);
        const compact = lines.join(' ');

        const companyName = pickCompanyName(lines, fileName);
        const location = normalizeLocation(getValueAfterLabels(compact, ['소재지', '주소', '근무지', '위치']));
        const industry = getValueAfterLabels(compact, ['업종', '주요생산품', '생산품']) || '';
        const type = getCompanyType(compact);
        const revenue = getFirstMatch(compact, /\d[\d,.]*\s*(?:억|조)(?:\s*원)?/) || '';
        const employees = getFirstMatch(compact, /\d[\d,.]*\s*(?:명|명\+)/) || '';
        const dormitory = getDormitory(compact);
        const military = /병역\s*특례.{0,10}(가능|불가능)|산업기능요원|보충역|현역/i.test(compact)
            ? (/불가능|불가/i.test(compact) ? '불가능' : '가능')
            : '';
        const workType = getFirstMatch(compact, /(?:주간근무|주간|야간|교대|2교대|3교대|4조\s*\d교대|상주근무)/) || '';
        const salary = getFirstMatch(compact, /(?:시급|월급|연봉)\s*[\d,]+(?:\s*원|\s*만원|\+)?/) || '';
        const job = getValueAfterLabels(compact, ['직무', '전공', '담당업무', '모집직무']) || '';
        const series = normalizeSeries(getValueAfterLabels(compact, ['계열', '전공계열']) || job || compact);
        const headcount = getFirstMatch(compact, /\d+\s*명\s*\([^)]+\)|\d+\s*명/) || '';
        const homepageUrl = getFirstMatch(compact, /https?:\/\/[^\s]+|www\.[^\s]+/) || '';
        const documents = getValueAfterLabels(compact, ['필요서류', '제출서류', '서류']) || '';
        const submissionDeadline = getValueAfterLabels(compact, ['제출기한', '서류제출기한', '접수마감']) || '';

        return {
            companyName,
            location,
            industry,
            type,
            revenue,
            employees,
            dormitory,
            military,
            workType,
            salary,
            series,
            job,
            headcount,
            homepageUrl,
            documents,
            submissionDeadline,
            officer: '',
            documentDate: '',
            interviewDate: '',
            notes: ''
        };
    }

    function pickCompanyName(lines, fileName) {
        const ignored = /기업|채용|정보|관리|업종|연매출|종업원|기숙사|병역|근무|급여|직무|필요서류|제출서류|제출기한/;
        const nameLine = lines.find((line) => !ignored.test(line) && /(주식회사|\(주\)|㈜|회사|기업|산업|테크|전자|정밀|공업)/.test(line));
        if (nameLine) return cleanupField(nameLine);

        const fallback = lines.find((line) => !ignored.test(line) && line.length >= 2);
        if (fallback) return cleanupField(fallback);

        return fileName.replace(/\.[^.]+$/, '') || '새 회사';
    }

    function getValueAfterLabels(text, labels) {
        for (const label of labels) {
            const regex = new RegExp(`${label}\\s*[:：]?\\s*([^|\\n]{2,40})`, 'i');
            const match = text.match(regex);
            if (match) return cleanupField(match[1]);
        }
        return '';
    }

    function getFirstMatch(text, regex) {
        const match = text.match(regex);
        return match ? cleanupField(match[0]) : '';
    }

    function getCompanyType(text) {
        if (/대기업/.test(text)) return '대기업';
        if (/중견기업/.test(text)) return '중견기업';
        if (/중소기업/.test(text)) return '중소기업';
        return '';
    }

    function getDormitory(text) {
        if (/기숙사.{0,12}(유|있|제공|사내|사외)/.test(text)) {
            const match = text.match(/유\s*\((?:사내|사외)\)/);
            return match ? match[0].replace(/\s+/g, '') : '유';
        }
        if (/기숙사.{0,12}(무|없|미제공)/.test(text)) return '무';
        return '';
    }

    function cleanupField(value) {
        return String(value || '')
            .replace(/[|]+/g, ' ')
            .replace(/\s{2,}/g, ' ')
            .replace(/^[\s:：.-]+|[\s:：.-]+$/g, '')
            .trim();
    }

    function cleanupMultilineField(value) {
        return String(value || '')
            .replace(/[|]+/g, ' ')
            .split(/\r?\n/)
            .map((line) => line.replace(/[ \t]{2,}/g, ' ').replace(/^[\s:：.-]+|[\s:：.-]+$/g, ''))
            .join('\n')
            .trim();
    }

    function normalizeLocation(value) {
        const rawText = cleanupMultilineField(value);
        if (rawText.includes('\n')) return rawText;
        const text = cleanupField(rawText);
        if (!text) return '';
        const match = text.match(/^(\S+(?:도|시|특별시|광역시|특별자치시|특별자치도))\s+(\S+(?:시|군|구))/);
        if (match) return `${match[1]} ${match[2]}`;
        return text.split(/\s+/).slice(0, 2).join(' ');
    }

    function normalizeSeries(value) {
        const text = cleanupField(value);
        if (!text) return '';
        const values = [];
        if (/전기|전자|전력|전장|전기설비/.test(text)) values.push('전기');
        if (/기계|가공|정비|용접|금형|설비보전|CNC|MCT|선반|밀링/i.test(text)) values.push('기계');
        if (!values.length && (text === '전기' || text === '기계')) values.push(text);
        return [...new Set(values)].join(', ');
    }

    function normalizeCompanyRow(row) {
        return {
            ...row,
            location: normalizeLocation(row.location || row['소재지'] || row.address || ''),
            series: normalizeSeries(row.series || row['계열'] || row.major || ''),
            homepageUrl: cleanupField(row.homepageUrl || row['회사 홈페이지 URL'] || row['홈페이지 URL'] || row['홈페이지'] || ''),

    function isSubmissionDeadlineExpired(value) {
        const deadline = parseKoreanDate(value);
        if (!deadline) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        deadline.setHours(23, 59, 59, 999);
        return deadline < today;
    }

    function parseKoreanDate(value) {
        const text = cleanupField(value);
        if (!text) return null;
        const match = text.match(/(\d{4})[.\-/년\s]+(\d{1,2})[.\-/월\s]+(\d{1,2})/);
        if (!match) return null;
        const year = Number(match[1]);
        const month = Number(match[2]);
        const day = Number(match[3]);
        if (!year || !month || !day) return null;
        const date = new Date(year, month - 1, day);
        return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day
            ? date
            : null;
    }

    async function uploadRequestFile(file, companyId, previousPath = '') {
        if (!file) return null;
        if (!companyId) throw new Error('파일을 업로드하려면 먼저 항목 ID가 필요합니다.');

        const prepared = await prepareRequestFile(file);
        const path = `${companyId}/${Date.now()}-${createStorageSafeFileName(prepared.name, prepared.file.type || file.type)}`;
        const { error } = await getSupabaseClient()
            .storage
            .from(SUPABASE_REQUEST_BUCKET)
            .upload(path, prepared.file, {
                cacheControl: '3600',
                contentType: prepared.file.type || file.type || 'application/octet-stream',
                upsert: false
            });

        if (error) throw error;

        if (previousPath) {
            await getSupabaseClient().storage.from(SUPABASE_REQUEST_BUCKET).remove([previousPath]);
        }

        const { data } = getSupabaseClient().storage.from(SUPABASE_REQUEST_BUCKET).getPublicUrl(path);
        return {
            requestFileUrl: data?.publicUrl || '',
            requestFilePath: path,
            requestFileName: prepared.name
        };
    }

    async function prepareRequestFile(file) {
        if (isPdfFile(file)) {
            const compressed = await compressPdfFile(file);
            if (compressed.size > REQUEST_FILE_MAX_BYTES) {
                throw new Error('PDF를 200KB 미만으로 줄이지 못했습니다. 스캔 이미지가 많은 PDF는 압축 후 다시 업로드해주세요.');
            }
            return { file: compressed, name: file.name };
        }
        if (!file.type.startsWith('image/')) {
            if (file.size > REQUEST_FILE_MAX_BYTES) {
                throw new Error('이 문서 파일은 자동 압축할 수 없습니다. 200KB 이하 파일만 업로드해주세요.');
            }
            return { file, name: file.name };
        }
        const compressed = await compressImageFile(file);
        if (compressed.size > REQUEST_FILE_MAX_BYTES) {
            throw new Error('이미지를 200KB 미만으로 줄이지 못했습니다. 해상도가 낮은 파일로 다시 시도해주세요.');
        }
        return { file: compressed, name: file.name.replace(/\.[^.]+$/, '.jpg') };
    }

    function isPdfFile(file) {
        return file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
    }

    async function compressPdfFile(file) {
        if (file.size <= REQUEST_FILE_MAX_BYTES) return file;
        if (!window.PDFLib?.PDFDocument) {
            throw new Error('PDF 압축 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');
        }

        const arrayBuffer = await file.arrayBuffer();
        const pdfDoc = await window.PDFLib.PDFDocument.load(arrayBuffer, {
            ignoreEncryption: true,
            updateMetadata: false
        });
        pdfDoc.setProducer('CMS PDF Compressor');
        pdfDoc.setCreator('CMS');
        const bytes = await pdfDoc.save({
            useObjectStreams: true,
            addDefaultPage: false,
            objectsPerTick: 50
        });
        const compressed = new File([bytes], file.name, { type: 'application/pdf' });
        return compressed.size < file.size ? compressed : file;
    }

    function compressImageFile(file) {
        return new Promise((resolve, reject) => {
            const image = new Image();
            const objectUrl = URL.createObjectURL(file);
            image.onload = () => {
                URL.revokeObjectURL(objectUrl);
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const tryCompress = (maxSize, quality) => {
                    const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
                    canvas.width = Math.max(1, Math.round(image.width * scale));
                    canvas.height = Math.max(1, Math.round(image.height * scale));
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    context.drawImage(image, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        if (!blob) {
                            reject(new Error('이미지 압축에 실패했습니다.'));
                            return;
                        }
                        if (blob.size <= REQUEST_FILE_MAX_BYTES || (maxSize <= 600 && quality <= 0.45)) {
                            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
                            return;
                        }
                        const nextQuality = quality > 0.5 ? quality - 0.08 : quality;
                        const nextMaxSize = quality > 0.5 ? maxSize : Math.round(maxSize * 0.85);
                        tryCompress(nextMaxSize, nextQuality);
                    }, 'image/jpeg', quality);
                };
                tryCompress(1600, 0.82);
            };
            image.onerror = () => {
                URL.revokeObjectURL(objectUrl);
                reject(new Error('이미지 파일을 읽지 못했습니다.'));
            };
            image.src = objectUrl;
        });
    }

    function sanitizeStorageFileName(value) {
        return String(value || 'request-file')
            .replace(/[^\w.\-가-힣]+/g, '_')
            .replace(/_+/g, '_')
            .slice(0, 120);
    }

    function createStorageSafeFileName(fileName, mimeType = '') {
        const extension = getFileExtension(fileName, mimeType);
        const random = Math.random().toString(36).slice(2, 10);
        return `request-${random}${extension}`;
    }

    function getFileExtension(fileName, mimeType = '') {
        const match = String(fileName || '').match(/\.[a-z0-9]+$/i);
        if (match) return match[0].toLowerCase();
        if (mimeType === 'application/pdf') return '.pdf';
        if (mimeType === 'image/jpeg') return '.jpg';
        if (mimeType === 'image/png') return '.png';
        return '.bin';
    }

    async function saveInlineCompanyDetail(button) {
        if (!hasAdminPermission()) return;
        const detailRow = button.closest('.company-detail-row');
        const dataRow = detailRow?.previousElementSibling;
        if (!dataRow) return;
        const original = dataRow.__companyRow || getCompanyRowData(dataRow);
        const next = normalizeCompanyRow({
            ...original,
            homepageUrl: detailRow.querySelector('[data-detail-field="homepageUrl"]').value,
            documents: detailRow.querySelector('[data-detail-field="documents"]').value,
            submissionDeadline: detailRow.querySelector('[data-detail-field="submissionDeadline"]').value,
            officer: detailRow.querySelector('[data-detail-field="officer"]').value,
            documentDate: detailRow.querySelector('[data-detail-field="documentDate"]').value,
            interviewDate: detailRow.querySelector('[data-detail-field="interviewDate"]').value,
            notes: detailRow.querySelector('[data-detail-field="notes"]').value
        });
        const status = document.getElementById('uploadStatus');

        showSavingNotice('상세 항목을 저장하는 중입니다...');
        button.disabled = true;
        try {
            const requestFile = detailRow.querySelector('[data-detail-file="request"]')?.files?.[0];
            if (requestFile) {
                showSavingNotice('채용요청서를 200KB 미만으로 압축/업로드 중입니다...');
                Object.assign(next, await uploadRequestFile(requestFile, dataRow.dataset.id, original.requestFilePath));
            }
            showSavingNotice('상세 항목을 Supabase에 저장하는 중입니다...');
            await updateCompanyInSupabase(dataRow.dataset.id, next);
            detailRow.remove();
            await loadCompanies();
            status.textContent = '상세 항목이 저장되었습니다.';
        } catch (error) {
            console.error(error);
            const message = getErrorMessage(error) || '상세 항목을 저장하지 못했습니다.';
            status.textContent = message;
            alert(message);
            button.disabled = false;
        } finally {
            hideSavingNotice();
        }
    }

    function getCompanyFieldDefs() {
        return [
            ['companyName', '회사명'],
            ['location', '소재지'],
            ['industry', '업종'],
            ['type', '기업분류'],
            ['revenue', '연매출'],
            ['employees', '종업원'],
            ['dormitory', '기숙사'],
            ['military', '병역특례'],
            ['workType', '근무형태'],
            ['salary', '급여'],
            ['series', '계열'],
            ['job', '직무'],
            ['headcount', '채용인원']
        ];
    }

    function promptCompanyFields(current = {}) {
        const next = {};
        const fields = getCompanyFieldDefs();

        for (const [key, label] of fields) {
            const value = prompt(`${label}을(를) 입력하세요.`, current[key] || '');
            if (value === null) return;
            next[key] = value.trim();
        }
        return next;
    }

    async function deleteCompanyRow(button) {
        if (!hasAdminPermission()) return;
        if (!confirm('이 항목을 삭제할까요?')) return;
        const tr = button.closest('tr');
        const status = document.getElementById('uploadStatus');
        try {
            await deleteCompanyFromSupabase(tr?.dataset.id);
            await loadCompanies();
            status.textContent = '항목이 삭제되었습니다.';
        } catch (error) {
            console.error(error);
            status.textContent = getErrorMessage(error) || '항목을 삭제하지 못했습니다.';
        }
    }

    function renderTypeBadge(type) {
        if (!type) return '';
        const label = type === '중소기업'
            ? '<span>중소</span><span>기업</span>'
            : type === '중견기업'
                ? '<span>중견</span><span>기업</span>'
                : `<span>${escapeHtml(type)}</span>`;
        return `<span class="badge badge-blue type-badge">${label}</span>`;
    }

    function renderMilitaryBadge(value) {
        if (value === '가능') return '<span class="badge badge-green">가능</span>';
        return '';
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
        return escapeHtml(value);
    }

    function getErrorMessage(error) {
        if (!error) return '';
        const message = error.message || String(error);
        if (/Failed to fetch|NetworkError/i.test(message)) {
            return 'Supabase 연결에 실패했습니다. URL에서 /rest/v1/을 빼고 프로젝트 URL만 입력했는지 확인해주세요.';
        }
        if (/relation .* does not exist|Could not find the table/i.test(message)) {
            return 'Supabase에 companies 테이블이 없습니다. CMS_supabase_schema.sql을 SQL Editor에서 먼저 실행해주세요.';
        }
        if (/permission denied|row-level security|violates row-level security/i.test(message)) {
            return 'Supabase RLS 정책 때문에 저장할 수 없습니다. CMS_supabase_schema.sql의 정책을 실행했는지 확인해주세요.';
        }
        if (/bucket not found|storage/i.test(message)) {
            return 'Supabase Storage 버킷 설정이 필요합니다. CMS_supabase_schema.sql을 SQL Editor에서 다시 실행해주세요.';
        }
        return message;
    }

    function filterTable() {
        const nameInput = document.getElementById('searchName').value.toLowerCase();
        const locationInput = document.getElementById('searchLocation').value.toLowerCase();
        const typeInput = document.getElementById('filterType').value;
        const dormitoryInput = document.getElementById('filterDormitory').value;
        const militaryInput = document.getElementById('filterMilitary').value;
        const workTypeInput = document.getElementById('searchWorkType').value.toLowerCase();
        const seriesInput = document.getElementById('filterSeries').value;
        const jobInput = document.getElementById('searchJob').value.toLowerCase();
        
        const table = document.getElementById('companyTable');
        const tr = table.getElementsByTagName('tr');

        for (let i = 1; i < tr.length; i++) {
            const cells = tr[i].getElementsByTagName('td');
            if (cells.length < COMPANY_COLUMNS.length) continue;
            const row = tr[i].__companyRow || {};
            const tdName = cells[0].textContent.toLowerCase();
            const tdLocation = cells[1].textContent.toLowerCase();
            const tdType = row.type || cells[3].textContent;
            const tdDormitory = row.dormitory || cells[6].textContent;
            const tdMilitary = row.military || cells[7].textContent;
            const tdWorkType = cells[8].textContent.toLowerCase();
            const tdSeries = row.series || cells[10].textContent;
            const tdJob = cells[11].textContent.toLowerCase();

            const matchName = tdName.includes(nameInput);
            const matchLocation = tdLocation.includes(locationInput);
            const matchType = typeInput === "" || tdType === typeInput;
            const matchDormitory = dormitoryInput === "" || tdDormitory === dormitoryInput;
            const matchMilitary = militaryInput === "" || tdMilitary === militaryInput;
            const matchWorkType = tdWorkType.includes(workTypeInput);
            const matchSeries = seriesInput === "" || tdSeries.includes(seriesInput);
            const matchJob = tdJob.includes(jobInput);

            if (matchName && matchLocation && matchType && matchDormitory && matchMilitary && matchWorkType && matchSeries && matchJob) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }
</script>
