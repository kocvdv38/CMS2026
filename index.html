<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 채용 정보 관리 시스템</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #f8fafe;
            --text-color: #333;
            --border-color: #e1e8ed;
        }

        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0,05);
        }

        h2 {
            color: var(--primary-color);
            border-left: 5px solid var(--primary-color);
            padding-left: 15px;
            margin-bottom: 25px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            margin-bottom: 25px;
        }

        .header-row h2 {
            margin-bottom: 0;
        }

        .dashboard-title {
            cursor: pointer;
            user-select: none;
            font-size: calc(1.5em - 3px);
        }

        /* 필터 영역 */
        .filter-section {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            background: #f1f5f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .filter-toggle-button {
            display: none;
            width: 100%;
            margin-bottom: 10px;
            border: 0;
            border-radius: 8px;
            padding: 10px 12px;
            background: #dbeafe;
            color: #1d4ed8;
            cursor: pointer;
            font-weight: 800;
        }

        .filter-group label {
            display: block;
            font-size: 0.9em;
            font-weight: bold;
            margin-bottom: 5px;
            color: #64748b;
        }

        input, select, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            box-sizing: border-box;
        }

        /* 테이블 영역 */
        .table-wrapper {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            cursor: grab;
        }

        .table-wrapper.dragging {
            cursor: grabbing;
            user-select: none;
        }

        table {
            border-collapse: collapse;
            table-layout: fixed;
            width: 860px;
            min-width: 100%;
            margin-top: 10px;
            font-size: 0.85em;
        }

        th {
            background-color: #f8fafc;
            color: #475569;
            font-weight: 600;
            padding: 12px;
            border-bottom: 2px solid var(--border-color);
            white-space: nowrap;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            white-space: pre-line;
            overflow-wrap: anywhere;
            vertical-align: middle;
        }

        #companyTable th:nth-child(1),
        #companyTable td:nth-child(1) {
            width: 30px;
        }

        #companyTable th:nth-child(2),
        #companyTable td:nth-child(2) {
            width: 110px;
        }

        #companyTable th:nth-child(3),
        #companyTable td:nth-child(3),
        #companyTable th:nth-child(4),
        #companyTable td:nth-child(4) {
            width: 40px;
        }

        #companyTable th:nth-child(5),
        #companyTable td:nth-child(5) {
            width: 110px;
        }

        #companyTable td:nth-child(5),
        #companyTable td:nth-child(14) {
            font-size: calc(1em - 2px);
        }

        #companyTable td:nth-child(7),
        #companyTable td:nth-child(8),
        #companyTable td:nth-child(9),
        #companyTable td:nth-child(11),
        #companyTable td:nth-child(12),
        #companyTable td:nth-child(13) {
            font-size: calc(1em - 2px);
        }

        #companyTable th:nth-child(6),
        #companyTable td:nth-child(6) {
            width: 40px;
        }

        #companyTable th:nth-child(7),
        #companyTable td:nth-child(7) {
            width: 50px;
        }

        #companyTable th:nth-child(8),
        #companyTable td:nth-child(8),
        #companyTable th:nth-child(9),
        #companyTable td:nth-child(9),
        #companyTable th:nth-child(10),
        #companyTable td:nth-child(10) {
            width: 40px;
        }

        #companyTable th:nth-child(11),
        #companyTable td:nth-child(11) {
            width: 50px;
        }

        #companyTable th:nth-child(12),
        #companyTable td:nth-child(12) {
            width: 70px;
        }

        #companyTable th:nth-child(13),
        #companyTable td:nth-child(13) {
            width: 40px;
        }

        #companyTable th:nth-child(14),
        #companyTable td:nth-child(14) {
            width: 110px;
        }

        #companyTable th:nth-child(15),
        #companyTable td:nth-child(15) {
            width: 50px;
        }

        @media (min-width: 641px) {
            /* 관리자 수정 모드: 각 열 가로 +10px, 테이블 전체 폭 동기 */
            #companyTable.row-editing {
                width: 1050px;
            }

            #companyTable.row-editing th:nth-child(1),
            #companyTable.row-editing td:nth-child(1) {
                width: 40px;
            }

            #companyTable.row-editing th:nth-child(2),
            #companyTable.row-editing td:nth-child(2) {
                width: 120px;
            }

            #companyTable.row-editing th:nth-child(3),
            #companyTable.row-editing td:nth-child(3) {
                width: 80px;
            }

            #companyTable.row-editing th:nth-child(4),
            #companyTable.row-editing td:nth-child(4) {
                width: 50px;
            }

            #companyTable.row-editing th:nth-child(5),
            #companyTable.row-editing td:nth-child(5) {
                width: 120px;
            }

            #companyTable.row-editing th:nth-child(6),
            #companyTable.row-editing td:nth-child(6) {
                width: 60px;
            }

            #companyTable.row-editing th:nth-child(7),
            #companyTable.row-editing td:nth-child(7) {
                width: 60px;
            }

            #companyTable.row-editing th:nth-child(8),
            #companyTable.row-editing td:nth-child(8),
            #companyTable.row-editing th:nth-child(9),
            #companyTable.row-editing td:nth-child(9),
            #companyTable.row-editing th:nth-child(10),
            #companyTable.row-editing td:nth-child(10) {
                width: 50px;
            }

            #companyTable.row-editing th:nth-child(11),
            #companyTable.row-editing td:nth-child(11) {
                width: 60px;
            }

            #companyTable.row-editing th:nth-child(12),
            #companyTable.row-editing td:nth-child(12) {
                width: 80px;
            }

            #companyTable.row-editing th:nth-child(13),
            #companyTable.row-editing td:nth-child(13) {
                width: 50px;
            }

            #companyTable.row-editing th:nth-child(14),
            #companyTable.row-editing td:nth-child(14) {
                width: 120px;
            }

            #companyTable.row-editing th:nth-child(15),
            #companyTable.row-editing td:nth-child(15) {
                width: 60px;
            }

            #companyTable.row-editing tr[data-editing="true"] td {
                padding-top: 11px;
                padding-bottom: 11px;
            }

            #companyTable.row-editing tr[data-editing="true"] .cell-edit-input,
            #companyTable.row-editing tr[data-editing="true"] .cell-edit-select {
                height: 46px;
                min-height: 46px;
            }

            #companyTable.row-editing tr[data-editing="true"] .cell-edit-input {
                min-height: 46px;
            }

            #companyTable.row-editing tr[data-editing="true"] .cell-edit-checks {
                min-height: 46px;
            }

            #companyTable.row-editing tr[data-editing="true"] .action-buttons {
                min-height: 46px;
            }
        }

        .series-lines {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            white-space: nowrap;
            word-break: keep-all;
        }

        tr:hover {
            background-color: #f1f5f9;
        }

        #companyTable tbody tr.deadline-expired:not(.detail-open) td.expired-overlay-anchor {
            position: relative;
        }

        #companyTable tbody tr.deadline-expired:not(.detail-open) td.expired-overlay-anchor::after {
            content: '제출기한 만료';
            position: absolute;
            z-index: 5;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            width: var(--expired-overlay-width, 100%);
            height: 100%;
            background: rgba(148, 163, 184, 0.42);
            color: rgba(220, 38, 38, 0.72);
            font-size: 1.05em;
            font-weight: 900;
            letter-spacing: 0.08em;
            pointer-events: none;
            white-space: nowrap;
        }

        .deadline-cell {
            font-weight: 700;
            font-size: calc(1em - 2px);
        }

        .deadline-highlight {
            display: inline-block;
            padding: 2px 4px;
            border-radius: 8px;
            line-height: 1.25;
        }

        .deadline-urgent {
            background: #fee2e2;
            color: #991b1b;
        }

        .deadline-soon {
            background: #fef9c3;
            color: #854d0e;
        }

        .deadline-safe {
            background: #dcfce7;
            color: #166534;
        }

        .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.8em;
            font-weight: bold;
            text-align: center;
        }
        .badge-blue { background: #dbeafe; color: #1e40af; }
        .badge-green { background: #dcfce7; color: #166534; }
        .type-badge-large { background: #dcfce7; color: #166534; }
        .type-badge-mid { background: #fef9c3; color: #854d0e; }
        .type-badge-small { background: #e0f2fe; color: #0369a1; }

        .type-badge {
            min-width: 38px;
            flex-direction: column;
            gap: 1px;
            line-height: 1.2;
        }

        .company-link {
            color: var(--primary-color);
            text-decoration: none;
        }

        .upload-section {
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        .upload-section h3 {
            margin: 0 0 10px;
            color: #1e40af;
        }

        .upload-help {
            margin: 8px 0 0;
            color: #64748b;
            font-size: 0.9em;
            line-height: 1.45;
        }

        .upload-status {
            margin-top: 10px;
            color: #1e40af;
            font-weight: 600;
            min-height: 20px;
        }

        .ai-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 12px;
        }

        .primary-button,
        .secondary-button {
            border: 0;
            border-radius: 6px;
            padding: 10px 12px;
            cursor: pointer;
            font-weight: 700;
        }

        .primary-button {
            background: var(--primary-color);
            color: #fff;
        }

        .secondary-button {
            background: #dbeafe;
            color: #1d4ed8;
        }

        #aiResultText {
            min-height: 120px;
            margin-top: 12px;
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.9em;
        }

        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: center;
            justify-content: center;
            white-space: nowrap;
        }

        .btn-small {
            border: 0;
            border-radius: 5px;
            padding: 4px 5px;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 600;
        }

        .btn-edit {
            background: #dbeafe;
            color: #1d4ed8;
        }

        .btn-delete {
            background: #fee2e2;
            color: #b91c1c;
        }

        .btn-save {
            background: #dcfce7;
            color: #166534;
        }

        .btn-cancel {
            background: #e2e8f0;
            color: #334155;
        }

        #companyTable tr[data-editing="true"] td {
            padding: 6px;
            white-space: normal;
            overflow-wrap: normal;
        }

        #companyTable tr[data-editing="true"] .action-buttons {
            align-items: center;
            min-height: 36px;
        }

        .cell-edit-input,
        .cell-edit-select {
            display: block;
            width: 100%;
            min-width: 0;
            max-width: 100%;
            height: 36px;
            padding: 6px 7px;
            font-size: 0.82em;
            line-height: 1.25;
            background: #fff;
        }

        .cell-edit-input {
            min-height: 36px;
            resize: vertical;
            white-space: pre-wrap;
        }

        .cell-edit-select {
            appearance: auto;
            white-space: nowrap;
        }

        .cell-edit-checks {
            display: flex;
            flex-direction: column;
            gap: 3px;
            justify-content: center;
            align-items: flex-start;
            min-width: 0;
            min-height: 36px;
            padding: 0;
            border: 0;
            border-radius: 0;
            background: transparent;
        }

        .cell-edit-checks label {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            white-space: nowrap;
            line-height: 1.1;
        }

        .cell-edit-checks input {
            width: auto;
        }

        .cell-edit-deadline-wrap {
            position: relative;
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: stretch;
            min-width: 0;
            text-align: left;
        }

        .cell-edit-deadline-date {
            display: block;
            width: 100%;
            min-width: 0;
            max-width: 100%;
            box-sizing: border-box;
            height: 34px;
            padding: 4px 6px;
            font-size: 0.8em;
            line-height: 1.2;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #fff;
        }

        .cell-edit-deadline-store {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        .saving-notice {
            position: fixed;
            top: 22px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 2000;
            padding: 12px 18px;
            border-radius: 999px;
            background: #1e40af;
            color: #fff;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.22);
            font-weight: 700;
        }

        .table-actions {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 10px;
        }

        .company-name-button {
            border: 0;
            background: transparent;
            color: var(--primary-color);
            cursor: pointer;
            font-size: calc(1em - 2px);
            font-weight: 700;
            text-decoration: underline;
            display: block;
            max-width: 150px;
            margin: 0 auto;
            line-height: 1.25;
            max-height: 2.5em;
            overflow: hidden;
            overflow-wrap: anywhere;
            white-space: normal;
        }

        .detail-modal {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.45);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
        }

        .detail-dialog {
            width: min(720px, 100%);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 20px 60px rgba(15, 23, 42, 0.25);
            overflow: hidden;
        }

        .detail-header,
        .detail-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 16px 18px;
            border-bottom: 1px solid var(--border-color);
        }

        .detail-footer {
            border-top: 1px solid var(--border-color);
            border-bottom: 0;
            justify-content: flex-end;
        }

        .detail-body {
            padding: 18px;
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 14px;
        }

        .detail-field.full {
            grid-column: 1 / -1;
        }

        .detail-field label {
            display: block;
            font-weight: 700;
            margin-bottom: 6px;
            color: #475569;
        }

        .company-detail-row td {
            background: #f8fafc;
            padding: 0;
            text-align: left;
            white-space: normal;
            line-height: normal;
        }

        .inline-detail-panel {
            border: 0;
            border-radius: 0;
            margin: 0;
            padding: 8px;
            background: transparent;
            max-width: 100%;
            overflow: hidden;
        }

        .inline-detail-title {
            font-size: 0.95em;
            font-weight: 800;
            color: #1e40af;
        }

        .inline-detail-title-group {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 1 180px;
            min-width: 0;
        }

        .inline-detail-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 8px;
            margin-bottom: 8px;
            flex-wrap: wrap;
        }

        .inline-detail-header-actions {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 1 1 520px;
            flex-wrap: wrap;
            justify-content: flex-end;
            min-width: 0;
        }

        /* 관리자 행 수정 중 상세 헤더(채용요청서·URL·담당·닫기 등)를 오른쪽에서 띄워 왼쪽으로 배치 */
        #companyTable.row-editing .company-detail-row .inline-detail-header-actions {
            margin-right: 210px;
        }

        .inline-detail-officer {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            min-height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: #f8fafc;
            color: #334155;
            font-size: 0.82em;
            font-weight: 700;
            white-space: nowrap;
        }

        .inline-detail-officer input {
            width: 86px;
            height: 24px;
            padding: 2px 6px;
            font-size: 0.9em;
        }

        .inline-detail-url-field {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 1 240px;
            min-width: 0;
        }

        .inline-detail-url-field label {
            color: #475569;
            font-size: 0.82em;
            font-weight: 700;
            white-space: nowrap;
        }

        .inline-detail-url-field input {
            width: 130px;
            height: 26px;
            padding: 3px 7px;
            font-size: 0.85em;
        }

        .homepage-link-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 0.82em;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .request-file-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 10px;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            font-size: 0.82em;
            font-weight: 800;
            text-decoration: none;
            white-space: nowrap;
        }

        .request-file-button.disabled {
            background: #e2e8f0;
            color: #64748b;
            cursor: not-allowed;
            opacity: 0.8;
        }

        .detail-header-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 28px;
            padding: 0 10px;
            border: 0;
            border-radius: 999px;
            background: #eef2ff;
            color: #3730a3;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 800;
            white-space: nowrap;
        }

        .request-file-upload {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            flex: 0 1 300px;
            min-width: 0;
        }

        .request-file-upload label {
            color: #475569;
            font-size: 0.82em;
            font-weight: 700;
            white-space: nowrap;
        }

        .request-file-upload input {
            max-width: 120px;
            padding: 4px;
            font-size: 0.82em;
        }

        .inline-detail-panel input:disabled,
        .inline-detail-panel textarea:disabled {
            background: #f8fafc;
            color: #475569;
        }

        .inline-detail-grid {
            display: grid;
            grid-template-columns: repeat(40, minmax(0, 1fr));
            gap: 5px 10px;
        }

        .inline-detail-field {
            display: block;
            min-height: 0;
            padding: 0;
            border: 0;
            background: transparent;
            box-sizing: border-box;
        }

        .inline-detail-field-body {
            height: var(--inline-detail-body-height, 38px);
            min-height: 38px;
            padding: 5px 7px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            background: #fff;
            box-sizing: border-box;
            overflow: hidden;
        }

        .inline-detail-field.full {
            grid-column: 1 / -1;
        }

        .inline-detail-field.span-2 {
            grid-column: span 2;
        }

        .inline-detail-field.span-7 {
            grid-column: span 7;
        }

        .inline-detail-field.span-12 {
            grid-column: span 12;
        }

        .inline-detail-field.span-16 {
            grid-column: span 16;
        }

        .inline-detail-field.span-3 {
            grid-column: span 3;
        }

        .inline-detail-field.span-4 {
            grid-column: span 4;
        }

        .inline-detail-field.span-8 {
            grid-column: span 8;
        }

        .inline-detail-field.span-5 {
            grid-column: span 5;
        }

        .inline-detail-field label {
            display: block;
            font-size: 0.86em;
            font-weight: 700;

    function initTableDragScroll() {
        const wrapper = document.querySelector('.table-wrapper');
        if (!wrapper) return;
        const interactiveSelector = 'a, button, input, textarea, select, label, [contenteditable="true"]';
        let isDragging = false;
        let pointerId = null;
        let startX = 0;
        let startScrollLeft = 0;

        wrapper.addEventListener('pointerdown', (event) => {
            if (event.button !== 0 || event.target.closest(interactiveSelector)) return;
            if (wrapper.scrollWidth <= wrapper.clientWidth) return;
            isDragging = true;
            pointerId = event.pointerId;
            startX = event.clientX;
            startScrollLeft = wrapper.scrollLeft;
            wrapper.classList.add('dragging');
            wrapper.setPointerCapture?.(pointerId);
        });

        wrapper.addEventListener('pointermove', (event) => {
            if (!isDragging || event.pointerId !== pointerId) return;
            wrapper.scrollLeft = startScrollLeft - (event.clientX - startX);
            event.preventDefault();
        });

        const stopDragging = (event) => {
            if (!isDragging || event.pointerId !== pointerId) return;
            isDragging = false;
            wrapper.classList.remove('dragging');
            wrapper.releasePointerCapture?.(pointerId);
            pointerId = null;
        };

        wrapper.addEventListener('pointerup', stopDragging);
        wrapper.addEventListener('pointercancel', stopDragging);
    }

        const { data, error } = await getSupabaseClient()
            .from(SUPABASE_TABLE)
            .select('*')
            .order('created_at', { ascending: false });

        if (error) throw error;
        return (data || []).map(supabaseRowToCompany);

    async function insertCompaniesToSupabase(rows) {
        const payload = rows.map(companyToSupabaseRow);
        payload.forEach((row) => delete row.id);

        const { error } = await getSupabaseClient()
            .from(SUPABASE_TABLE)
            .insert(payload);

        if (error) throw error;

        if (!id) throw new Error('수정할 항목의 ID가 없습니다.');

        delete payload.id;

        const { error } = await getSupabaseClient()
            .from(SUPABASE_TABLE)
            .update(payload)
            .eq('id', id);

        if (error) throw error;
    }

            .from(SUPABASE_TABLE)
            .delete()
            .eq('id', id);

        if (error) throw error;

    function companyToSupabaseRow(company) {
        const normalized = normalizeCompanyRow(company);
        return Object.entries(SUPABASE_COLUMN_MAP).reduce((row, [field, column]) => {
            row[column] = normalized[field] || '';
            return row;
        }, {});

        const company = Object.entries(SUPABASE_COLUMN_MAP).reduce((next, [field, column]) => {
            next[field] = row?.[column] ?? row?.[field] ?? '';
            return next;
        }, {});
        return normalizeCompanyRow(company);

            const rows = parseAiRows(input.value);
            if (!rows.length) {
                status.textContent = '추가할 항목이 없습니다. Gemini 답변을 다시 확인해주세요.';
                return;
            }

            status.textContent = '항목을 Supabase에 추가하는 중입니다...';
            await saveCompanyRows(rows);
            input.value = '';
            status.textContent = `${rows.length}개 항목이 추가되었습니다.`;
        } catch (error) {
            console.error(error);
            status.textContent = getErrorMessage(error) || 'Gemini 답변을 읽지 못했습니다.';
        } finally {
            if (button) button.disabled = false;
        }
    }

    function parseAiRows(value) {
        let cleaned = String(value || '')
            .trim()
            .replace(/^```(?:json)?/i, '')
            .replace(/```$/i, '')
            .trim();
        if (!cleaned) return [];

        if (!cleaned.startsWith('[') && !cleaned.startsWith('{')) {
            const arrayStart = cleaned.indexOf('[');
            const arrayEnd = cleaned.lastIndexOf(']');
            const objectStart = cleaned.indexOf('{');
            const objectEnd = cleaned.lastIndexOf('}');
            if (arrayStart >= 0 && arrayEnd > arrayStart) {
                cleaned = cleaned.slice(arrayStart, arrayEnd + 1);
            } else if (objectStart >= 0 && objectEnd > objectStart) {
                cleaned = cleaned.slice(objectStart, objectEnd + 1);
            }
        }

        const parsed = JSON.parse(cleaned);
        const rows = Array.isArray(parsed) ? parsed : [parsed];
        return rows.map(normalizeAiRow).filter((row) => row.companyName);
    }

    function normalizeAiRow(row) {
        return {
            companyName: getAiField(row, '회사명', 'companyName'),
            location: normalizeLocation(getAiField(row, '소재지', '주소', 'location', 'address')),
            industry: getAiField(row, '업종', 'industry'),
            type: getAiField(row, '기업분류', 'type'),
            revenue: getAiField(row, '연매출', 'revenue'),
            employees: getAiField(row, '종업원', 'employees'),
            dormitory: normalizeDormitory(getAiField(row, '기숙사', 'dormitory')),
            military: getAiField(row, '병역특례', 'military'),
            workType: getAiField(row, '근무형태', 'workType'),
            salary: getAiField(row, '급여', 'salary'),
            series: normalizeSeries(getAiField(row, '계열', '전공계열', 'series')),
            job: getAiField(row, '직무', '직무(전공)', '전공', 'job'),
            headcount: getAiField(row, '채용인원', 'headcount'),
            homepageUrl: getAiField(row, '회사 홈페이지 URL', '홈페이지', '홈페이지 URL', 'website', 'homepageUrl'),
            documents: getAiField(row, '필요서류', 'documents'),
            submissionDeadline: getAiField(row, '제출기한', '서류제출기한', 'submissionDeadline'),
            officer: getAiField(row, '담당 산학협력지원관', '담당자', '산학협력지원관', 'officer'),
            documentDate: getAiField(row, '서류전형 발표', '서류전형 일자', '서류전형일', 'documentDate'),
            aptitudeDate: getAiField(row, '인적성검사', '인적성 검사', 'aptitudeDate'),
            interviewDate: getAiField(row, '면접일정 일자', '면접일정', '면접일', 'interviewDate'),
            notes: getAiField(row, '특이사항', '비고', 'notes')
        };
    }

    function getAiField(row, ...keys) {
        for (const key of keys) {
            if (row && row[key] !== undefined && row[key] !== null) {
                return cleanupField(row[key]);
            }
        }
        return '';
    }

    function parseCompanyText(text, fileName = '') {
        const lines = text
            .split(/\r?\n/)
            .map((line) => line.replace(/\s+/g, ' ').trim())
            .filter(Boolean);
        const compact = lines.join(' ');

        const companyName = pickCompanyName(lines, fileName);
        const location = normalizeLocation(getValueAfterLabels(compact, ['소재지', '주소', '근무지', '위치']));
        const industry = getValueAfterLabels(compact, ['업종', '주요생산품', '생산품']) || '';
        const type = getCompanyType(compact);
        const revenue = getFirstMatch(compact, /\d[\d,.]*\s*(?:억|조)(?:\s*원)?/) || '';
        const employees = getFirstMatch(compact, /\d[\d,.]*\s*(?:명|명\+)/) || '';
        const dormitory = getDormitory(compact);
        const military = /병역\s*특례.{0,10}(가능|불가능)|산업기능요원|보충역|현역/i.test(compact)
            ? (/불가능|불가/i.test(compact) ? '불가능' : '가능')
            : '';
        const workType = getFirstMatch(compact, /(?:주간근무|주간|야간|교대|2교대|3교대|4조\s*\d교대|상주근무)/) || '';
        const salary = getFirstMatch(compact, /(?:시급|월급|연봉)\s*[\d,]+(?:\s*원|\s*만원|\+)?/) || '';
        const job = getValueAfterLabels(compact, ['직무', '전공', '담당업무', '모집직무']) || '';
        const series = normalizeSeries(getValueAfterLabels(compact, ['계열', '전공계열']) || job || compact);
        const headcount = getFirstMatch(compact, /\d+\s*명\s*\([^)]+\)|\d+\s*명/) || '';
        const homepageUrl = getFirstMatch(compact, /https?:\/\/[^\s]+|www\.[^\s]+/) || '';
        const documents = getValueAfterLabels(compact, ['필요서류', '제출서류', '서류']) || '';
        const submissionDeadline = getValueAfterLabels(compact, ['제출기한', '서류제출기한', '접수마감']) || '';

        return {
            companyName,
            location,
            industry,
            type,
            revenue,
            employees,
            dormitory,
            military,
            workType,
            salary,
            series,
            job,
            headcount,
            homepageUrl,
            documents,
            submissionDeadline,
            officer: '',
            documentDate: '',
            aptitudeDate: '',
            interviewDate: '',
            notes: ''
        };
    }

    function pickCompanyName(lines, fileName) {
        const ignored = /기업|채용|정보|관리|업종|연매출|종업원|기숙사|병역|근무|급여|직무|필요서류|제출서류|제출기한/;
        const nameLine = lines.find((line) => !ignored.test(line) && /(주식회사|\(주\)|㈜|회사|기업|산업|테크|전자|정밀|공업)/.test(line));
        if (nameLine) return cleanupField(nameLine);

        const fallback = lines.find((line) => !ignored.test(line) && line.length >= 2);
        if (fallback) return cleanupField(fallback);

        return fileName.replace(/\.[^.]+$/, '') || '새 회사';
    }

    function getValueAfterLabels(text, labels) {
        for (const label of labels) {
            const regex = new RegExp(`${label}\\s*[:：]?\\s*([^|\\n]{2,40})`, 'i');
            const match = text.match(regex);
            if (match) return cleanupField(match[1]);
        }
        return '';
    }

    function getFirstMatch(text, regex) {
        const match = text.match(regex);
        return match ? cleanupField(match[0]) : '';
    }

    function getCompanyType(text) {
        if (/대기업/.test(text)) return '대기업';
        if (/중견기업/.test(text)) return '중견기업';
        if (/중소기업/.test(text)) return '중소기업';
        return '';
    }

    function getDormitory(text) {
        const valueMatch = text.match(/(?:기숙사|숙소)\s*[:：]?\s*(O\s*\([^)]*\)|O|X|○\s*\([^)]*\)|○|◯\s*\([^)]*\)|◯|유\s*\([^)]*\)|유|무|있음|없음|제공|미제공|불가)/i);
        if (valueMatch) return cleanupField(valueMatch[1]);

        const phraseMatch = text.match(/(?:기숙사|숙소)\s*(?:제공|있음|없음|미제공|불가|가능)/i);
        return phraseMatch ? cleanupField(phraseMatch[0]) : '';
    }

    function normalizeDormitory(value) {
        return cleanupField(value);
    }

    function cleanupField(value) {
        return String(value || '')
            .replace(/[|]+/g, ' ')
            .replace(/\s{2,}/g, ' ')
            .replace(/^[\s:：.-]+|[\s:：.-]+$/g, '')
            .trim();
    }

    function cleanupMultilineField(value) {
        return String(value || '')
            .replace(/[|]+/g, ' ')
            .split(/\r?\n/)
            .map((line) => line.replace(/[ \t]{2,}/g, ' ').replace(/^[\s:：.-]+|[\s:：.-]+$/g, ''))
            .join('\n')
            .trim();
    }

    function normalizeLocation(value) {
        const rawText = cleanupMultilineField(value);
        if (rawText.includes('\n')) return rawText;
        const text = cleanupField(rawText);
        if (!text) return '';
        const match = text.match(/^(\S+(?:도|시|특별시|광역시|특별자치시|특별자치도))\s+(\S+(?:시|군|구))/);
        if (match) return `${match[1]} ${match[2]}`;
        return text.split(/\s+/).slice(0, 2).join(' ');
    }

    function normalizeSeries(value) {
        const text = cleanupField(value);
        if (!text) return '';
        const values = [];
        if (/전기|전자|전력|전장|전기설비/.test(text)) values.push('전기');
        if (/기계|가공|정비|용접|금형|설비보전|CNC|MCT|선반|밀링/i.test(text)) values.push('기계');
        if (!values.length && (text === '전기' || text === '기계')) values.push(text);
        return [...new Set(values)].join(', ');
    }

    function normalizeCompanyRow(row) {
        return {
            ...row,
            location: normalizeLocation(row.location || row['소재지'] || row.address || ''),
            series: normalizeSeries(row.series || row['계열'] || row.major || ''),
            dormitory: normalizeDormitory(row.dormitory || row['기숙사'] || ''),
            homepageUrl: cleanupField(row.homepageUrl || row['회사 홈페이지 URL'] || row['홈페이지 URL'] || row['홈페이지'] || ''),
            requestFileUrl: cleanupField(row.requestFileUrl || row['채용요청서 URL'] || row['채용요청서'] || ''),
            requestFilePath: cleanupField(row.requestFilePath || row['채용요청서 경로'] || ''),
            requestFileName: cleanupField(row.requestFileName || row['채용요청서 파일명'] || ''),
            documents: cleanupField(row.documents || row['필요서류'] || ''),
            submissionDeadline: cleanupField(row.submissionDeadline || row['제출기한'] || row['서류제출기한'] || ''),
            officer: cleanupField(row.officer || row['담당 산학협력지원관'] || row['담당자'] || ''),
            documentDate: cleanupField(row.documentDate || row['서류전형 발표'] || row['서류전형 일자'] || row['서류전형일'] || ''),
            aptitudeDate: cleanupField(row.aptitudeDate || row['인적성검사'] || row['인적성 검사'] || ''),
            interviewDate: cleanupField(row.interviewDate || row['면접일정 일자'] || row['면접일정'] || ''),
            notes: cleanupMultilineField(row.notes || row['특이사항'] || row['비고'] || '')
        };
    }

    function addCompanyRow(row) {
        const tbody = document.querySelector('#companyTable tbody');
        const tr = document.createElement('tr');
        updateCompanyRow(tr, normalizeCompanyRow(row));
        tbody.prepend(tr);
    }

    function renderCompanyRows(rows) {
        const tbody = document.querySelector('#companyTable tbody');
        document.getElementById('companyTable')?.classList.remove('row-editing');
        tbody.innerHTML = '';
        rows = rows.map(normalizeCompanyRow);
        updateFilterOptions(rows);
        if (!rows.length) {
            tbody.innerHTML = '<tr><td colspan="15">등록된 기업 항목이 없습니다.</td></tr>';
            return;
        }
        rows.forEach((row) => {
            const tr = document.createElement('tr');
            updateCompanyRow(tr, row);
            tbody.appendChild(tr);
        });
        filterTable();
    }

    function updateFilterOptions(rows) {
        filterOptionValues = {
            type: getUniqueValues(rows, 'type'),
            dormitory: getUniqueValues(rows, 'dormitory'),
            military: getUniqueValues(rows, 'military'),
            workType: getUniqueValues(rows, 'workType'),
            series: getUniqueSeriesValues(rows)
        };
        updateFilterValueOptions();
    }

    function getUniqueValues(rows, field) {
        return [...new Set(rows.map((row) => cleanupField(row[field])).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'ko'));
    }

    function getUniqueSeriesValues(rows) {
        const values = rows.flatMap((row) => cleanupField(row.series).split(',').map((item) => item.trim()).filter(Boolean));
        return [...new Set(values)].sort((a, b) => a.localeCompare(b, 'ko'));
    }

    function setSelectOptions(selectId, values) {
        const select = document.getElementById(selectId);
        if (!select) return;
        const selected = select.value;
        select.innerHTML = '<option value="">전체</option>'
            + values.map((value) => `<option value="${escapeAttr(value)}">${escapeHtml(value)}</option>`).join('');
        select.value = values.includes(selected) ? selected : '';
    }

    function handleFilterFieldChange() {
        updateFilterValueOptions();
        filterTable();
    }

    function updateFilterValueOptions() {
        const fieldSelect = document.getElementById('filterField');
        const valueSelect = document.getElementById('filterValue');
        if (!fieldSelect || !valueSelect) return;
        const field = fieldSelect.value;
        const values = field ? (filterOptionValues[field] || []) : [];
        const selected = valueSelect.value;
        valueSelect.disabled = !field;
        valueSelect.innerHTML = '<option value="">전체</option>'
            + values.map((value) => `<option value="${escapeAttr(value)}">${escapeHtml(value)}</option>`).join('');
        valueSelect.value = values.includes(selected) ? selected : '';
    }

    function setDatalistOptions(datalistId, values) {
        const datalist = document.getElementById(datalistId);
        if (!datalist) return;
        datalist.innerHTML = values.map((value) => `<option value="${escapeAttr(value)}"></option>`).join('');
    }

    async function saveCompanyRows(rows) {
        rows = rows.map(normalizeCompanyRow);
        await insertCompaniesToSupabase(rows);
        await loadCompanies();
    }

    function updateCompanyRow(tr, row) {
        row = normalizeCompanyRow(row);
        if (tr.nextElementSibling?.classList.contains('company-detail-row')) {
            tr.nextElementSibling.remove();
        }
        tr.dataset.id = row.id || '';
        tr.__companyRow = row;
        delete tr.dataset.editing;
        delete tr.dataset.originalRow;
        tr.classList.toggle('deadline-expired', isSubmissionDeadlineExpired(row.submissionDeadline));
        tr.classList.remove('detail-open');
        const adminCellClass = `admin-only ${isAdminMode ? '' : 'hidden'}`;
        tr.innerHTML = `
            <td class="${adminCellClass}">${renderActionButtons()}</td>
            <td><button class="company-name-button" type="button" onclick="showCompanyDetail(this)">${escapeHtml(row.companyName)}</button></td>
            <td class="deadline-cell">${renderSubmissionDeadlineValue(row.submissionDeadline)}</td>

            <td>${escapeHtml(row.industry)}</td>
            <td>${renderTypeBadge(row.type)}</td>
            <td>${escapeHtml(row.revenue)}</td>
            <td>${escapeHtml(row.employees)}</td>
            <td>${escapeHtml(row.dormitory)}</td>
            <td>${renderMilitaryBadge(row.military)}</td>

            <td>${escapeHtml(row.salary)}</td>

    function renderActionButtons() {
        return `
            <div class="action-buttons">
                <button class="btn-small btn-edit" type="button" onclick="editCompanyRow(this)">수정</button>
                <button class="btn-small btn-delete" type="button" onclick="deleteCompanyRow(this)">삭제</button>
            </div>
        `;
    }

    function renderSeriesValue(value) {
        const items = cleanupField(value)
            .split(',')
            .map((item) => item.trim())
            .filter(Boolean);
        if (!items.length) return '';
        return `<span class="series-lines">${items.map((item) => `<span>${escapeHtml(item)}</span>`).join('')}</span>`;
    }

    function renderSubmissionDeadlineValue(value) {
        const text = cleanupField(value);
        if (!text) return '';
        const toneClass = getSubmissionDeadlineToneClass(text);
        return `<span class="deadline-highlight ${toneClass}">${escapeHtml(text)}</span>`;
    }

    function isSubmissionDeadlineExpired(value) {
        const deadline = parseKoreanDate(value);
        if (!deadline) return false;
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        deadline.setHours(23, 59, 59, 999);
        return deadline < today;
    }

    function getSubmissionDeadlineToneClass(value) {
        const deadline = parseKoreanDate(value);
        if (!deadline) return '';
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        deadline.setHours(0, 0, 0, 0);
        const daysLeft = Math.ceil((deadline - today) / (1000 * 60 * 60 * 24));
        if (daysLeft < 0) return '';
        if (daysLeft <= 1) return 'deadline-urgent';
        if (daysLeft <= 7) return 'deadline-soon';
        return 'deadline-safe';
    }

    function parseKoreanDate(value) {
        const text = cleanupField(value);
        if (!text) return null;
        const match = text.match(/(\d{4})[.\-/년\s]+(\d{1,2})[.\-/월\s]+(\d{1,2})/);
        if (!match) return null;
        const year = Number(match[1]);
        const month = Number(match[2]);
        const day = Number(match[3]);
        if (!year || !month || !day) return null;
        const date = new Date(year, month - 1, day);
        return date.getFullYear() === year && date.getMonth() === month - 1 && date.getDate() === day
            ? date
            : null;
    }

    function submissionDeadlineToDateInputValue(text) {
        const d = parseKoreanDate(text);
        if (!d) return '';
        const y = d.getFullYear();
        const m = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        return `${y}-${m}-${day}`;
    }

    function formatSubmissionDeadlineDisplay(ymd) {
        const m = String(ymd || '').trim().match(/^(\d{4})-(\d{2})-(\d{2})$/);
        if (!m) return '';
        return `${m[1]}.\n${m[2]}.${m[3]}`;
    }

    function syncSubmissionDeadlineFromPicker(dateInput) {
        const wrap = dateInput.closest('.cell-edit-deadline-wrap');
        if (!wrap) return;
        const store = wrap.querySelector('textarea[data-edit-field="submissionDeadline"]');
        if (!dateInput.value) {
            if (store) store.value = '';
            return;
        }
        const formatted = formatSubmissionDeadlineDisplay(dateInput.value);
        if (store) store.value = formatted;
    }

    function updateExpiredOverlayWidth(tr) {
        if (!tr?.classList?.contains('deadline-expired')) return;
        tr.style.setProperty('--expired-overlay-width', `${tr.getBoundingClientRect().width}px`);
    }

    function setExpiredOverlayAnchor(tr) {
        if (!tr || tr.classList.contains('company-detail-row')) return;
        const cells = Array.from(tr.children);
        cells.forEach((cell) => cell.classList.remove('expired-overlay-anchor'));
        const hasAdminCell = cells[0]?.classList.contains('admin-only');
        const anchor = isAdminMode && hasAdminCell && !cells[0].classList.contains('hidden')
            ? cells[0]
            : cells[hasAdminCell ? 1 : 0];
        anchor?.classList.add('expired-overlay-anchor');
    }

    function normalizeExistingRows() {
        document.querySelectorAll('#companyTable tbody tr').forEach((tr) => {
            if (!tr.children[0]?.classList.contains('admin-only')) {
                const td = document.createElement('td');
                td.className = 'admin-only';
                td.innerHTML = renderActionButtons();
                tr.prepend(td);
            }
            tr.children[0]?.classList.toggle('hidden', !isAdminMode);
            setExpiredOverlayAnchor(tr);
        });

    async function addManualCompany() {
        if (!hasAdminPermission()) return;
        const row = promptCompanyFields({});
        if (!row) return;

        const status = document.getElementById('uploadStatus');
        try {
            await saveCompanyRows([row]);
            status.textContent = '항목이 추가되었습니다.';

            console.error(error);

    function getCompanyRowData(tr) {
        const cells = Array.from(tr.children);
        const row = tr.__companyRow || {};
        const offset = cells[0]?.classList.contains('admin-only') ? 1 : 0;
        const cellText = (index) => cells[index + offset]?.textContent.trim() || '';
        return {
            companyName: cellText(0),
            submissionDeadline: row.submissionDeadline || cellText(1),
            location: cellText(2),
            industry: cellText(3),
            type: cellText(4),
            revenue: cellText(5),
            employees: cellText(6),
            dormitory: cellText(7),
            military: cellText(8),
            workType: cellText(9),
            salary: cellText(10),
            series: row.series || cellText(11),
            job: cellText(12),
            headcount: cellText(13),
            homepageUrl: row.homepageUrl || '',
            requestFileUrl: row.requestFileUrl || '',
            requestFilePath: row.requestFilePath || '',
            requestFileName: row.requestFileName || '',
            documents: row.documents || '',
            officer: row.officer || '',
            documentDate: row.documentDate || '',
            aptitudeDate: row.aptitudeDate || '',
            interviewDate: row.interviewDate || '',
            notes: row.notes || ''
        };
    }

    async function editCompanyRow(button) {
        if (!hasAdminPermission()) return;
        const tr = button.closest('tr');
        if (!tr || tr.dataset.editing === 'true') return;
        const detailOpenHere = tr.nextElementSibling?.classList.contains('company-detail-row');
        if (!detailOpenHere) {
            const nameBtn = tr.querySelector('.company-name-button');
            if (nameBtn) showCompanyDetail(nameBtn);
        }
        enterCompanyRowEditMode(tr);
    }

    function enterCompanyRowEditMode(tr) {
        const current = getCompanyRowData(tr);

        const status = document.getElementById('uploadStatus');

    function syncInlineDetailFieldHeights(detailRow) {
        if (!detailRow) return;
        const bodies = Array.from(detailRow.querySelectorAll('.inline-detail-field-body'));
        const notesBody = detailRow.querySelector('[data-detail-body="notes"]');
        const notesContent = notesBody?.querySelector('textarea, .inline-detail-readonly');
        if (!bodies.length || !notesBody || !notesContent) return;

        if (window.matchMedia('(max-width: 640px)').matches) {
            bodies.forEach((body) => {
                body.style.removeProperty('--inline-detail-body-height');
                body.classList.remove('notes-scroll');
            });
            notesContent.style.removeProperty('height');
            return;
        }

        bodies.forEach((body) => {
            body.style.removeProperty('--inline-detail-body-height');
            body.classList.remove('notes-scroll');
        });
        notesContent.style.height = 'auto';

        const bodyStyle = getComputedStyle(notesBody);
        const contentStyle = getComputedStyle(notesContent);
        const bodyChrome = parseFloat(bodyStyle.paddingTop)
            + parseFloat(bodyStyle.paddingBottom)
            + parseFloat(bodyStyle.borderTopWidth)
            + parseFloat(bodyStyle.borderBottomWidth);
        const contentChrome = parseFloat(contentStyle.paddingTop) + parseFloat(contentStyle.paddingBottom);
        const lineHeight = parseFloat(contentStyle.lineHeight) || parseFloat(contentStyle.fontSize) * 1.35;
        const minHeight = 38;
        const maxHeight = Math.ceil(bodyChrome + contentChrome + (lineHeight * 3));
        const neededHeight = Math.ceil(notesContent.scrollHeight + bodyChrome);
        const nextHeight = Math.min(maxHeight, Math.max(minHeight, neededHeight));
        const shouldScroll = neededHeight > maxHeight + 1;

        bodies.forEach((body) => {
            body.style.setProperty('--inline-detail-body-height', `${nextHeight}px`);
        });
        notesBody.classList.toggle('notes-scroll', shouldScroll);
        notesContent.style.height = '100%';
    }

    async function uploadRequestFile(file, companyId, previousPath = '') {
        if (!file) return null;
        if (!companyId) throw new Error('파일을 업로드하려면 먼저 항목 ID가 필요합니다.');

        const prepared = await prepareRequestFile(file);
        const path = `${companyId}/${Date.now()}-${createStorageSafeFileName(prepared.name, prepared.file.type || file.type)}`;
        const { error } = await getSupabaseClient()
            .storage
            .from(SUPABASE_REQUEST_BUCKET)
            .upload(path, prepared.file, {
                cacheControl: '3600',
                contentType: prepared.file.type || file.type || 'application/octet-stream',
                upsert: false
            });

        if (error) throw error;

        if (previousPath) {
            await getSupabaseClient().storage.from(SUPABASE_REQUEST_BUCKET).remove([previousPath]);
        }

        const { data } = getSupabaseClient().storage.from(SUPABASE_REQUEST_BUCKET).getPublicUrl(path);
        return {
            requestFileUrl: data?.publicUrl || '',
            requestFilePath: path,
            requestFileName: prepared.name
        };
    }

    async function prepareRequestFile(file) {
        if (isPdfFile(file)) {
            const compressed = await compressPdfFile(file);
            if (compressed.size > REQUEST_FILE_MAX_BYTES) {
                throw new Error('PDF를 200KB 미만으로 줄이지 못했습니다. 스캔 이미지가 많은 PDF는 압축 후 다시 업로드해주세요.');
            }
            return { file: compressed, name: file.name };
        }
        if (!file.type.startsWith('image/')) {
            if (file.size > REQUEST_FILE_MAX_BYTES) {
                throw new Error('이 문서 파일은 자동 압축할 수 없습니다. 200KB 이하 파일만 업로드해주세요.');
            }
            return { file, name: file.name };
        }
        const compressed = await compressImageFile(file);
        if (compressed.size > REQUEST_FILE_MAX_BYTES) {
            throw new Error('이미지를 200KB 미만으로 줄이지 못했습니다. 해상도가 낮은 파일로 다시 시도해주세요.');
        }
        return { file: compressed, name: file.name.replace(/\.[^.]+$/, '.jpg') };
    }

    function isPdfFile(file) {
        return file.type === 'application/pdf' || /\.pdf$/i.test(file.name);
    }

    async function compressPdfFile(file) {
        if (file.size <= REQUEST_FILE_MAX_BYTES) return file;
        if (!window.PDFLib?.PDFDocument) {
            throw new Error('PDF 압축 라이브러리를 불러오지 못했습니다. 인터넷 연결을 확인해주세요.');
        }

        const arrayBuffer = await file.arrayBuffer();
        const pdfDoc = await window.PDFLib.PDFDocument.load(arrayBuffer, {
            ignoreEncryption: true,
            updateMetadata: false
        });
        pdfDoc.setProducer('CMS PDF Compressor');
        pdfDoc.setCreator('CMS');
        const bytes = await pdfDoc.save({
            useObjectStreams: true,
            addDefaultPage: false,
            objectsPerTick: 50
        });
        const compressed = new File([bytes], file.name, { type: 'application/pdf' });
        return compressed.size < file.size ? compressed : file;
    }

    function compressImageFile(file) {
        return new Promise((resolve, reject) => {
            const image = new Image();
            const objectUrl = URL.createObjectURL(file);
            image.onload = () => {
                URL.revokeObjectURL(objectUrl);
                const canvas = document.createElement('canvas');
                const context = canvas.getContext('2d');
                const tryCompress = (maxSize, quality) => {
                    const scale = Math.min(1, maxSize / Math.max(image.width, image.height));
                    canvas.width = Math.max(1, Math.round(image.width * scale));
                    canvas.height = Math.max(1, Math.round(image.height * scale));
                    context.clearRect(0, 0, canvas.width, canvas.height);
                    context.drawImage(image, 0, 0, canvas.width, canvas.height);
                    canvas.toBlob((blob) => {
                        if (!blob) {
                            reject(new Error('이미지 압축에 실패했습니다.'));
                            return;
                        }
                        if (blob.size <= REQUEST_FILE_MAX_BYTES || (maxSize <= 600 && quality <= 0.45)) {
                            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
                            return;
                        }
                        const nextQuality = quality > 0.5 ? quality - 0.08 : quality;
                        const nextMaxSize = quality > 0.5 ? maxSize : Math.round(maxSize * 0.85);
                        tryCompress(nextMaxSize, nextQuality);
                    }, 'image/jpeg', quality);
                };
                tryCompress(1600, 0.82);
            };
            image.onerror = () => {
                URL.revokeObjectURL(objectUrl);
                reject(new Error('이미지 파일을 읽지 못했습니다.'));
            };
            image.src = objectUrl;
        });
    }

    function sanitizeStorageFileName(value) {
        return String(value || 'request-file')
            .replace(/[^\w.\-가-힣]+/g, '_')
            .replace(/_+/g, '_')
            .slice(0, 120);
    }

    function createStorageSafeFileName(fileName, mimeType = '') {
        const extension = getFileExtension(fileName, mimeType);
        const random = Math.random().toString(36).slice(2, 10);
        return `request-${random}${extension}`;
    }

    function getFileExtension(fileName, mimeType = '') {
        const match = String(fileName || '').match(/\.[a-z0-9]+$/i);
        if (match) return match[0].toLowerCase();
        if (mimeType === 'application/pdf') return '.pdf';
        if (mimeType === 'image/jpeg') return '.jpg';
        if (mimeType === 'image/png') return '.png';
        return '.bin';
    }

    function escapeHtml(value) {
        return String(value || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
    }

    function escapeAttr(value) {
        return escapeHtml(value);

    function getErrorMessage(error) {
        if (!error) return '';
        const message = error.message || String(error);
        if (/Failed to fetch|NetworkError/i.test(message)) {
            return 'Supabase 연결에 실패했습니다. URL에서 /rest/v1/을 빼고 프로젝트 URL만 입력했는지 확인해주세요.';
        }
        if (/relation .* does not exist|Could not find the table/i.test(message)) {
            return 'Supabase에 companies 테이블이 없습니다. CMS_supabase_schema.sql을 SQL Editor에서 먼저 실행해주세요.';
        }
        if (/Could not find .* column|column .* does not exist|schema cache/i.test(message)) {
            return 'Supabase companies 테이블 컬럼이 최신 코드와 다릅니다. CMS_supabase_schema.sql을 SQL Editor에서 다시 실행해주세요.';
        }
        if (/permission denied|row-level security|violates row-level security/i.test(message)) {
            return 'Supabase RLS 정책 때문에 저장할 수 없습니다. CMS_supabase_schema.sql의 정책을 실행했는지 확인해주세요.';
        }
        if (/bucket not found|storage/i.test(message)) {
            return 'Supabase Storage 버킷 설정이 필요합니다. CMS_supabase_schema.sql을 SQL Editor에서 다시 실행해주세요.';
        }
        return message;
    }

    function filterTable() {
        const keywordInput = document.getElementById('searchKeyword').value.toLowerCase();
        const filterField = document.getElementById('filterField').value;
        const filterValue = document.getElementById('filterValue').value;
        
        const table = document.getElementById('companyTable');
        const tr = table.getElementsByTagName('tr');

        for (let i = 1; i < tr.length; i++) {
            const cells = tr[i].getElementsByTagName('td');
            if (cells.length < COMPANY_COLUMNS.length) continue;
            const row = tr[i].__companyRow || {};
            const offset = cells[0]?.classList.contains('admin-only') ? 1 : 0;
            const cellText = (index) => cells[index + offset]?.textContent || '';
            const tdName = cellText(0).toLowerCase();
            const tdLocation = cellText(2).toLowerCase();
            const tdType = row.type || cellText(4);
            const tdDormitory = row.dormitory || cellText(7);
            const tdMilitary = row.military || cellText(8);
            const tdWorkType = cellText(9);
            const tdSeries = row.series || cellText(11);
            const tdJob = cellText(12).toLowerCase();
            const combinedSearchText = `${tdName} ${tdLocation} ${tdJob}`;

            const matchKeyword = keywordInput === "" || combinedSearchText.includes(keywordInput);
            const matchSelectedFilter = matchesSelectedFilter(filterField, filterValue, {
                type: tdType,
                dormitory: tdDormitory,
                military: tdMilitary,
                workType: tdWorkType,
                series: tdSeries
            });

            if (matchKeyword && matchSelectedFilter) {
                tr[i].style.display = "";
            } else {
                tr[i].style.display = "none";
            }
        }
    }

    function matchesSelectedFilter(field, value, rowValues) {
        if (!field || !value) return true;
        if (field === 'series') return cleanupField(rowValues.series).includes(value);
        return cleanupField(rowValues[field]) === value;
    }
</script>
